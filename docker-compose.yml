version: '3.8'
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=123@Password # لازم يطابق اللي في appsettings.json
    ports:
      - "1433:1433"

  backend:
    build: ./Backend
    ports:
      - "5000:8080" # تأكدي من بورت الباك اند
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=RentVibeDb;User Id=sa;Password=123@Password;TrustServerCertificate=True;
    depends_on:
        - db

  frontend:
    build: ./Frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend